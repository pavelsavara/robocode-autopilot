# sprint-pipeline.yml — Stage 1 of the sprint CI pipeline.
#
# Purpose:
#   Build robot JAR, run battles against fixed opponent set, produce
#   summary.json and upload recordings for downstream processing.
#
# Data flow:
#   - summary.json (~2KB) → downloaded by AI agent
#   - recordings-chunk-* (~1.25GB total) → consumed by sprint-process.yml
#   - chunk-results-* → consumed by aggregate job
#   - Per-opponent score table → $GITHUB_STEP_SUMMARY
#
# Downstream:
#   sprint-process.yml triggers via workflow_run on completion.
#   sprint-train.yml triggers via workflow_run on sprint-process completion.

name: 1 Sprint Battles

on:
  workflow_dispatch:
    inputs:
      rounds:
        description: 'Rounds per battle'
        required: false
        default: '35'
        type: string
      battles_per_opponent:
        description: 'Battles per opponent'
        required: false
        default: '3'
        type: string
  push:
    branches: [main]
    paths:
      - 'robot/**'
      - 'core/**'
      - 'pipeline/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - '.github/workflows/eval-sprint.yml'

permissions:
  contents: read
  actions: read

env:
  ROUNDS: ${{ inputs.rounds || '35' }}
  BATTLES_PER_OPPONENT: ${{ inputs.battles_per_opponent || '3' }}

jobs:
  # ─── Step 1: Build the robot JAR ───
  build:
    runs-on: ubuntu-latest
    outputs:
      jar_name: ${{ steps.build.outputs.jar_name }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build robot JAR
        id: build
        run: |
          ./gradlew :robot:jar --no-daemon --console=plain
          JAR=$(ls robot/build/libs/cz.zamboch.Autopilot-*.jar | head -n 1)
          if [ -z "$JAR" ]; then
            echo "::error::No robot JAR produced"
            exit 1
          fi
          echo "jar_name=$(basename "$JAR")" >> "$GITHUB_OUTPUT"
          echo "Built: $JAR"

          # Validate JAR
          unzip -t "$JAR" > /dev/null
          echo "JAR integrity OK"

          # Also build pipeline distribution for stage 2
          ./gradlew :pipeline:installDist --no-daemon --console=plain
          echo "Pipeline distribution built"

      - uses: actions/upload-artifact@v7
        with:
          name: robot-jar
          path: robot/build/libs/cz.zamboch.Autopilot-*.jar
          retention-days: 7

      - uses: actions/upload-artifact@v7
        with:
          name: pipeline-dist
          path: pipeline/build/install/pipeline/
          retention-days: 7

  # ─── Step 2: Run battles in parallel — 16 opponents split across 4 runners ───
  #
  # Fixed eval set: 6 Strong-tier + 10 Upper-mid-tier = 16 opponents.
  # Source of truth: sprint.md Phase 1. Hard-coded here so eval is deterministic
  # across sprints (NOT pulled from rumble/top50.txt — that's run-season's job).
  battles:
    needs: [build]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/pavelsavara/robocode-autopilot/battle-runner:latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        chunk:
          - id: 0
            opponents: '["abc.Shadow","voidious.Diamond","jk.mega.DrussGT","jk.mini.CunobelinDC"]'
          - id: 1
            opponents: '["pe.SandboxDT","oog.mega.Saguaro","cx.BlestPain","ary.FourWD"]'
          - id: 2
            opponents: '["ej.ChocolateBar","dft.Cardigan","eem.zapper","darkcanuck.Pris"]'
          - id: 3
            opponents: '["tobe.Fusion","mld.Moebius","simonton.mini.WeeksOnEnd","simonton.mega.SniperFrog"]'
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: rumble/scripts
          path: repo

      - name: Download fresh robot JAR
        uses: actions/download-artifact@v8
        with:
          name: robot-jar
          path: /tmp/robot-jar

      - name: Fetch opponent JARs from robots branch
        run: |
          apk add --no-cache git git-lfs unzip zip jq
          git lfs install
          git clone --depth=1 --branch=robots --single-branch \
            https://github.com/${{ github.repository }}.git /tmp/robots
          cd /tmp/robots && git lfs pull && cd -

          # Drop any pre-existing cz.zamboch.Autopilot JAR shipped on the robots
          # branch — we want the FRESHLY BUILT one from this workflow run.
          rm -f /opt/robocode/robots/cz.zamboch.Autopilot*.jar
          rm -f /tmp/robots/cz.zamboch.Autopilot*.jar

          cp /tmp/robots/*.jar /opt/robocode/robots/ 2>/dev/null || true
          cp /tmp/robot-jar/*.jar /opt/robocode/robots/

          echo "Robots loaded: $(ls /opt/robocode/robots/*.jar | wc -l)"

          # Validate + drop corrupt JARs (same logic as run-season.yml)
          CORRUPT=0
          for jar in /opt/robocode/robots/*.jar; do
            if ! unzip -t "$jar" > /dev/null 2>&1; then
              echo "CORRUPT — removing: $(basename "$jar")"
              rm "$jar"
              CORRUPT=$((CORRUPT + 1))
            fi
          done
          echo "Removed $CORRUPT corrupt JARs"

          # Inject .properties for JARs that lack them
          for jar in /opt/robocode/robots/*.jar; do
            if unzip -l "$jar" 2>/dev/null | grep -q '\.properties$'; then
              continue
            fi
            jarname=$(basename "$jar" .jar)
            classname=$(echo "$jarname" | sed 's/_.*//')
            version=$(echo "$jarname" | sed 's/^[^_]*_//')
            proppath=$(echo "$classname" | sed 's/\./\//g').properties
            mkdir -p "/tmp/propgen/$(dirname "$proppath")"
            printf "robot.classname=%s\nrobot.version=%s\n" "$classname" "$version" > "/tmp/propgen/$proppath"
            (cd /tmp/propgen && zip -g "$jar" "$proppath")
            rm -rf /tmp/propgen
          done

          # Force Robocode to rescan
          rm -rf /opt/robocode/robots/.data 2>/dev/null || true

      - name: Environment check
        run: |
          echo "--- Java ---"
          java -version 2>&1 || echo "::error::Java not found!"
          echo "--- Node ---"
          node --version || echo "::error::Node not found!"
          echo "--- Robot JARs ---"
          ls -la /opt/robocode/robots/*.jar 2>/dev/null | head -30
          echo "--- Robocode libs ---"
          ls /opt/robocode/libs/ 2>/dev/null || echo "::error::No Robocode libs found at /opt/robocode/libs/"
          echo "--- Our robot JAR contents (top 20) ---"
          for jar in /opt/robocode/robots/cz.zamboch.Autopilot*.jar; do
            echo "=== $jar ==="
            unzip -l "$jar" 2>/dev/null | head -20
          done

      - name: Pre-flight battle test
        run: |
          # Run a quick 1-round battle to verify Robocode works before
          # spending time on the full chunk. Same pattern as run-season.yml.
          FIRST_OPP=$(echo '${{ matrix.chunk.opponents }}' | jq -r '.[0]')
          echo "Pre-flight: cz.zamboch.Autopilot vs $FIRST_OPP (1 round)"

          cat > /tmp/preflight.battle <<EOF
          #Battle Properties
          robocode.battleField.width=800
          robocode.battleField.height=600
          robocode.battle.numRounds=1
          robocode.battle.gunCoolingRate=0.1
          robocode.battle.rules.inactivityTime=450
          robocode.battle.hideEnemyNames=false
          robocode.battle.selectedRobots=cz.zamboch.Autopilot,$FIRST_OPP
          EOF

          echo "--- Battle file ---"
          cat /tmp/preflight.battle

          java -cp '/opt/robocode/libs/*' \
            -Xmx512M \
            -XX:+IgnoreUnrecognizedVMOptions \
            '--add-opens=java.base/sun.net.www.protocol.jar=ALL-UNNAMED' \
            '--add-opens=java.base/java.lang.reflect=ALL-UNNAMED' \
            '--add-opens=java.base/java.lang=ALL-UNNAMED' \
            '--add-opens=java.base/java.io=ALL-UNNAMED' \
            '--add-opens=java.base/java.net=ALL-UNNAMED' \
            '--add-opens=java.base/java.util=ALL-UNNAMED' \
            -DNOSECURITY=true \
            -Djava.awt.headless=true \
            robocode.Robocode \
            -cwd /opt/robocode \
            -battle /tmp/preflight.battle \
            -results /tmp/preflight-results.txt \
            -nodisplay 2>&1 || true

          echo "--- Pre-flight results ---"
          cat /tmp/preflight-results.txt 2>/dev/null || echo "::error::No results file produced!"

          echo "--- Robot .data directory after scan ---"
          ls -la /opt/robocode/robots/.data/ 2>/dev/null || echo "No .data directory"
          find /opt/robocode/robots/.data/ -name '*.jar.txt' -exec echo {} \; -exec head -5 {} \; 2>/dev/null || true

          # Verify both bots were found
          BOT_LINES=$(grep -cE '^\s*[12]' /tmp/preflight-results.txt 2>/dev/null || echo 0)
          if [ "$BOT_LINES" -lt 2 ]; then
            echo "::error::Pre-flight FAILED — one or both robots not found by Robocode"
            echo "Check the robot .data directory above for scanner errors"
            exit 1
          fi
          echo "✅ Pre-flight OK — both robots loaded"

      - name: Build chunk battle plan
        run: |
          # Expand opponents into BATTLES_PER_OPPONENT pairs against our bot
          jq -c -n \
            --argjson opps '${{ matrix.chunk.opponents }}' \
            --argjson n "$BATTLES_PER_OPPONENT" \
            '[ $opps[] as $o | range($n) | {bot_a:"cz.zamboch.Autopilot", bot_b:$o} ]' \
            > chunk-battles.json
          echo "Chunk ${{ matrix.chunk.id }} battles:"
          jq '. | length' chunk-battles.json
          jq '.[0:4]' chunk-battles.json

      - name: Run chunk battles
        run: |
          # Recordings stay inside this runner — never uploaded.
          mkdir -p recordings
          # NOTE: run-battle.mjs continues on individual failures (saves
          # results.json after each battle), so a single broken opponent
          # does not abort the whole chunk.
          node repo/rumble/scripts/run-battle.mjs \
            --robocode-dir /opt/robocode \
            --battles chunk-battles.json \
            --out results/ \
            --rounds "$ROUNDS" \
            --record-dir recordings/ || true

          echo "--- Chunk ${{ matrix.chunk.id }} results ---"
          if [ -f results/results.json ]; then
            jq 'length' results/results.json
            # Dump errors from failed battles so we can diagnose without
            # downloading the artifact
            FAIL_COUNT=$(jq '[.[] | select(.error == true)] | length' results/results.json)
            if [ "$FAIL_COUNT" -gt 0 ]; then
              echo "::warning::$FAIL_COUNT battles failed in chunk ${{ matrix.chunk.id }}"
              echo "--- Failed battle details ---"
              jq '.[] | select(.error == true) | {bot_a, bot_b, message, stderr: (.stderr // "n/a") | .[0:500], stdout: (.stdout // "n/a") | .[0:300]}' results/results.json
            fi
          else
            echo "::warning::No results.json produced for chunk ${{ matrix.chunk.id }}"
            echo '[]' > results/results.json
            mkdir -p results
          fi

      # Upload results.json (per-battle JSON, ~10–30 KB).
      - uses: actions/upload-artifact@v7
        with:
          name: chunk-results-${{ matrix.chunk.id }}
          path: results/results.json
          retention-days: 7

      # Upload recordings for downstream CSV processing (sprint-process.yml).
      - uses: actions/upload-artifact@v7
        with:
          name: recordings-chunk-${{ matrix.chunk.id }}
          path: recordings/
          retention-days: 14

      # Upload autopilot.dat for downstream merge (3-sprint-train.yml).
      # Each chunk builds its own VCS histograms + gun stats during battles.
      # Stage 3 merges all chunks into a single DefaultDataFile.java.
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: dat-chunk-${{ matrix.chunk.id }}
          path: /opt/robocode/robots/.data/cz/zamboch/Autopilot.data/autopilot.dat
          retention-days: 7
          if-no-files-found: warn

  # ─── Step 3: Self-battle sanity check (MUST pass: 45–55%) ───
  self-battle:
    needs: [build]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/pavelsavara/robocode-autopilot/battle-runner:latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: rumble/scripts
          path: repo

      - name: Download fresh robot JAR
        uses: actions/download-artifact@v8
        with:
          name: robot-jar
          path: /tmp/robot-jar

      - name: Install fresh robot JAR (no opponents needed)
        run: |
          apk add --no-cache git unzip zip jq
          rm -f /opt/robocode/robots/cz.zamboch.Autopilot*.jar
          cp /tmp/robot-jar/*.jar /opt/robocode/robots/

          # Inject .properties if missing
          for jar in /opt/robocode/robots/cz.zamboch.Autopilot*.jar; do
            if unzip -l "$jar" 2>/dev/null | grep -q '\.properties$'; then
              continue
            fi
            jarname=$(basename "$jar" .jar)
            classname=$(echo "$jarname" | sed 's/_.*//')
            version=$(echo "$jarname" | sed 's/^[^_]*_//')
            proppath=$(echo "$classname" | sed 's/\./\//g').properties
            mkdir -p "/tmp/propgen/$(dirname "$proppath")"
            printf "robot.classname=%s\nrobot.version=%s\n" "$classname" "$version" > "/tmp/propgen/$proppath"
            (cd /tmp/propgen && zip -g "$jar" "$proppath")
            rm -rf /tmp/propgen
          done
          rm -rf /opt/robocode/robots/.data 2>/dev/null || true
          echo "Robot JAR installed: $(ls /opt/robocode/robots/cz.zamboch.Autopilot*.jar)"

      - name: Environment check
        run: |
          echo "--- Java ---"
          java -version 2>&1 || echo "::error::Java not found!"
          echo "--- Node ---"
          node --version || echo "::error::Node not found!"
          echo "--- Robot JARs ---"
          ls -la /opt/robocode/robots/*.jar 2>/dev/null | head -10
          echo "--- Robocode libs ---"
          ls /opt/robocode/libs/ 2>/dev/null || echo "::error::No Robocode libs found!"

      - name: Pre-flight self-battle test
        run: |
          echo "Pre-flight: cz.zamboch.Autopilot vs cz.zamboch.Autopilot (1 round)"
          cat > /tmp/preflight.battle <<EOF
          #Battle Properties
          robocode.battleField.width=800
          robocode.battleField.height=600
          robocode.battle.numRounds=1
          robocode.battle.gunCoolingRate=0.1
          robocode.battle.rules.inactivityTime=450
          robocode.battle.hideEnemyNames=false
          robocode.battle.selectedRobots=cz.zamboch.Autopilot,cz.zamboch.Autopilot
          EOF

          java -cp '/opt/robocode/libs/*' \
            -Xmx512M \
            -XX:+IgnoreUnrecognizedVMOptions \
            '--add-opens=java.base/sun.net.www.protocol.jar=ALL-UNNAMED' \
            '--add-opens=java.base/java.lang.reflect=ALL-UNNAMED' \
            '--add-opens=java.base/java.lang=ALL-UNNAMED' \
            '--add-opens=java.base/java.io=ALL-UNNAMED' \
            '--add-opens=java.base/java.net=ALL-UNNAMED' \
            '--add-opens=java.base/java.util=ALL-UNNAMED' \
            -DNOSECURITY=true \
            -Djava.awt.headless=true \
            robocode.Robocode \
            -cwd /opt/robocode \
            -battle /tmp/preflight.battle \
            -results /tmp/preflight-results.txt \
            -nodisplay 2>&1 || true

          echo "--- Pre-flight results ---"
          cat /tmp/preflight-results.txt 2>/dev/null || echo "::error::No results file produced!"

          BOT_LINES=$(grep -cE '^\s*[12]' /tmp/preflight-results.txt 2>/dev/null || echo 0)
          if [ "$BOT_LINES" -lt 2 ]; then
            echo "::error::Pre-flight FAILED — robot not found by Robocode"
            ls -la /opt/robocode/robots/.data/ 2>/dev/null || echo "No .data directory"
            exit 1
          fi
          echo "✅ Pre-flight OK"

      - name: Run 3 self-battles
        run: |
          mkdir -p results recordings
          jq -n -c \
            --argjson n "$BATTLES_PER_OPPONENT" \
            '[ range($n) | {bot_a:"cz.zamboch.Autopilot", bot_b:"cz.zamboch.Autopilot"} ]' \
            > self-battles.json
          node repo/rumble/scripts/run-battle.mjs \
            --robocode-dir /opt/robocode \
            --battles self-battles.json \
            --out results/ \
            --rounds "$ROUNDS" \
            --record-dir recordings/ || true

      - name: Verify self-battle is 45–55%
        run: |
          if [ ! -f results/results.json ]; then
            echo "::error::Self-battle produced no results.json"
            exit 1
          fi

          # Average bot_a score across all valid (non-error) battles.
          AVG=$(jq '
            [ .[] | select(.error != true) | .bot_a.score_pct ]
            | if length == 0 then 0 else (add / length) end
          ' results/results.json)

          COUNT=$(jq '[.[] | select(.error != true)] | length' results/results.json)
          echo "Self-battle: $COUNT valid battles, avg bot_a score = $AVG%"

          # Expected band: 45–55%. Outside this range → position/init bug.
          IS_OK=$(jq -n --argjson avg "$AVG" --argjson n "$COUNT" \
            '($n > 0) and ($avg >= 45) and ($avg <= 55)')

          {
            echo "## Self-battle sanity check"
            echo ""
            echo "- Valid battles: $COUNT"
            echo "- Avg bot_a score: ${AVG}%"
            echo "- Expected band: 45–55%"
            if [ "$IS_OK" = "true" ]; then
              echo "- Result: ✅ PASS"
            else
              echo "- Result: ❌ FAIL — outside 45–55% band, indicates position/init bug"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$IS_OK" != "true" ]; then
            echo "::warning::Self-battle outside 45–55% band ($AVG%) — position/init bug suspected"
            # Non-blocking: self-battle is diagnostic, not a pipeline gate
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: self-battle-results
          path: results/results.json
          retention-days: 7

  # ─── Step 4: Aggregate per-opponent results into summary.json ───
  #
  # This is the ONLY job whose artifact crosses the wire to Pavel.
  # Output: a single summary.json (~2 KB) matching local-pipeline.ps1's schema.
  aggregate:
    needs: [battles]
    if: always() && needs.battles.result != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: chunk-results-*
          path: chunks/

      - uses: actions/download-artifact@v8
        with:
          name: self-battle-results
          path: self-battle/

      - name: Build summary.json
        run: |
          # Concatenate all per-chunk results into one flat list of battles
          mkdir -p out
          jq -s 'add' chunks/*/results.json > all-results.json
          echo "Total battles collected: $(jq 'length' all-results.json)"

          SELF_AVG=$(jq '[.[] | select(.error != true) | .bot_a.score_pct] | if length == 0 then null else (add / length) end' \
            self-battle/results.json 2>/dev/null || echo null)
          SELF_COUNT=$(jq '[.[] | select(.error != true)] | length' \
            self-battle/results.json 2>/dev/null || echo 0)

          # Build summary.json matching local-pipeline.ps1 schema:
          # { timestamp, total_battles, wins, overall_score_pct,
          #   per_opponent: [{name, avg_score, battles, wins, scores}], raw_results,
          #   self_battle: {avg_score_pct, battles} }
          #
          # NOTE: Robocode sorts bots alphabetically in results, so bot_a in the
          # results file is NOT necessarily our robot. We identify our bot by name
          # prefix "cz.zamboch.Autopilot" and compute scores from the opponent's
          # perspective. Each result gets .our and .opp fields for clarity.
          jq -n \
            --argjson all "$(cat all-results.json)" \
            --argjson self_avg "$SELF_AVG" \
            --argjson self_count "$SELF_COUNT" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%S)" \
            --arg run_id "${{ github.run_id }}" \
            --arg sha "${{ github.sha }}" \
            '
            # Tag each result with .our_score/.opp_score/.opp_name based on which
            # side is our robot (name starts with "cz.zamboch.Autopilot").
            def tag_sides:
              if (.bot_a.name | startswith("cz.zamboch.Autopilot")) then
                . + {our_score: .bot_a.score_pct, opp_score: .bot_b.score_pct, opp_name: .bot_b.name}
              else
                . + {our_score: .bot_b.score_pct, opp_score: .bot_a.score_pct, opp_name: .bot_a.name}
              end;

            ($all | map(select(.error != true)) | map(tag_sides)) as $valid
            | ($valid | map(.opp_name) | unique) as $opps
            | {
                timestamp: $ts,
                run_id: $run_id,
                commit_sha: $sha,
                total_battles: ($valid | length),
                wins: ([$valid[] | select(.our_score > .opp_score)] | length),
                overall_score_pct: (
                  if ($valid | length) == 0 then 0
                  else (([$valid[].our_score] | add) / ($valid | length) | . * 10 | round / 10)
                  end
                ),
                per_opponent: [
                  $opps[] as $name
                  | ($valid | map(select(.opp_name == $name))) as $g
                  | {
                      name: $name,
                      avg_score: (([$g[].our_score] | add) / ($g | length) | . * 10 | round / 10),
                      battles: ($g | length),
                      wins: ([$g[] | select(.our_score > .opp_score)] | length),
                      scores: [$g[].our_score]
                    }
                ] | sort_by(-.avg_score),
                self_battle: {
                  avg_score_pct: $self_avg,
                  battles: $self_count
                },
                errors: ([$all[] | select(.error == true)] | length),
                raw_results: $all
              }
            ' > out/summary.json

          echo "--- summary.json ---"
          jq '{timestamp, total_battles, wins, overall_score_pct, errors, self_battle, opp_count: (.per_opponent | length)}' \
            out/summary.json

      - name: Post per-opponent table to job summary
        run: |
          {
            echo "## Sprint Eval — ${{ github.sha }}"
            echo ""
            echo "**Build:** \`${{ needs.build.outputs.jar_name }}\`  "
            echo "**Run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo ""

            jq -r '
              "- **Overall score:** \(.overall_score_pct)%\n" +
              "- **Wins:** \(.wins) / \(.total_battles)\n" +
              "- **Errors:** \(.errors)\n" +
              "- **Self-battle avg:** \(.self_battle.avg_score_pct // "n/a")%"
            ' out/summary.json

            echo ""
            echo "### Per-opponent breakdown"
            echo ""
            echo "| Opponent | Avg score % | Wins | Battles | Scores |"
            echo "|---|---:|---:|---:|---|"
            jq -r '
              .per_opponent[]
              | "| \(.name) | \(.avg_score) | \(.wins) | \(.battles) | \(.scores | map(tostring) | join(", ")) |"
            ' out/summary.json
          } >> "$GITHUB_STEP_SUMMARY"

      # Final artifact policy: ONLY summary.json crosses the wire.
      # Recordings stayed inside the battle runners (never uploaded).
      # Per-chunk results.json files were upload-only-for-aggregate and are
      # NOT included here — Pavel only needs the summary.
      - uses: actions/upload-artifact@v7
        with:
          name: sprint-summary
          path: out/summary.json
          retention-days: 90
