# scrape-wiki.yml — Fetch RoboRumble participants from RoboWiki and store bot JARs.
#
# Downloads robot JARs and updates participants.txt in the robots branch.
# Trigger: manual only

name: Scrape Wiki Participants

on:
  workflow_dispatch:
    inputs:
      max_bots:
        description: 'Maximum number of bots to fetch'
        required: false
        default: '150'
        type: string
      skip_download:
        description: 'Skip downloading JARs (update list only)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      # Fetch existing robots branch
      - name: Fetch robots branch
        run: |
          git fetch origin robots --depth=1 || true
          WORK=$(mktemp -d)
          git worktree add "$WORK" origin/robots 2>/dev/null || {
            git worktree add --orphan "$WORK" robots
          }
          echo "DATA_WORK=$WORK" >> "$GITHUB_ENV"
          mkdir -p "$WORK"

      # Run scraper
      - name: Scrape participants
        run: |
          node rumble/scripts/scrape-wiki.mjs \
            --top-list rumble/top150.txt \
            --max-bots ${{ inputs.max_bots || '150' }} \
            --out-dir "$DATA_WORK" \
            --participants "$DATA_WORK/participants.txt" \
            ${{ inputs.skip_download && '--skip-download' || '' }}

      # Commit and push
      - name: Commit changes
        run: |
          cd "$DATA_WORK"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Track JARs with LFS
          git lfs install
          git lfs track "*.jar"
          git add .gitattributes *.jar participants.txt

          git diff --cached --quiet || {
            git commit -m "Scrape wiki participants $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin HEAD:robots
          }

      - name: Cleanup
        if: always()
        run: git worktree remove "$DATA_WORK" --force 2>/dev/null || true
