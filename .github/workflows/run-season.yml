# run-season.yml — Orchestrator workflow for a full rumble season run.
# Plans battles, runs them in parallel using the Docker battle-runner image,
# computes rankings, publishes pages, and uploads battle recordings.
#
# Trigger: manual only (workflow_dispatch)

name: Run Rumble Season

on:
  workflow_dispatch:
    inputs:
      max_parallel:
        description: 'Maximum parallel battle jobs'
        required: false
        default: '20'
        type: string
      rounds:
        description: 'Rounds per battle'
        required: false
        default: '35'
        type: string
      season:
        description: 'Season number (auto-incremented on re-trigger)'
        required: false
        default: '1'
        type: string
      max_seasons:
        description: 'Maximum seasons before stopping'
        required: false
        default: '5'
        type: string
      min_battles_per_pair:
        description: 'Minimum battles per pair before considered stable'
        required: false
        default: '2'
        type: string

permissions:
  contents: write
  packages: read
  pages: write
  actions: write

jobs:
  # ─── Step 1: Plan battles ───
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      total_battles: ${{ steps.plan.outputs.total_battles }}
    steps:
      - uses: actions/checkout@v6

      - name: Fetch historical results
        run: |
          mkdir -p results
          git fetch origin robots --depth=1 || true
          if git show origin/robots:results/ > /dev/null 2>&1; then
            git checkout origin/robots -- results/ 2>/dev/null || true
            echo "Loaded $(ls results/*.json 2>/dev/null | wc -l) historical result files"
          else
            echo "No historical results found"
          fi

      - name: Plan battles
        id: plan
        run: |
          RESULTS_FLAG=""
          RESULT_COUNT=$(find results -name '*.json' 2>/dev/null | wc -l)
          if [ "$RESULT_COUNT" -gt 0 ]; then
            RESULTS_FLAG="--results results/"
          fi

          node rumble/scripts/plan-battles.mjs \
            --participants rumble/top50.txt \
            --chunks ${{ inputs.max_parallel || '20' }} \
            --min-battles ${{ inputs.min_battles_per_pair || '2' }} \
            $RESULTS_FLAG \
            --out battle-plan.json

          TOTAL=$(jq '.total_battles' battle-plan.json)
          CHUNKS=$(jq '.num_chunks' battle-plan.json)
          MATRIX=$(jq -c '{chunk: [range(.num_chunks)]}' battle-plan.json)
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "total_battles=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "Season ${{ inputs.season || '1' }}: $TOTAL battles in $CHUNKS chunks"

      - uses: actions/upload-artifact@v7
        with:
          name: battle-plan
          path: battle-plan.json

  # ─── Step 2: Run battles in parallel using Docker image ───
  battles:
    needs: [plan]
    if: needs.plan.outputs.total_battles != '0'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/pavelsavara/robocode-autopilot/battle-runner:latest
    strategy:
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
      max-parallel: 20
      fail-fast: false
    steps:
      # Download battle plan
      - uses: actions/download-artifact@v8
        with:
          name: battle-plan

      # Fetch robot JARs from robots branch
      - name: Fetch robot JARs
        run: |
          apk add --no-cache git git-lfs unzip
          git lfs install
          git clone --depth=1 --branch=robots --single-branch \
            https://github.com/${{ github.repository }}.git /tmp/robots || true
          cd /tmp/robots && git lfs pull && cd -
          cp /tmp/robots/*.jar /opt/robocode/robots/ 2>/dev/null || true
          echo "Robots loaded:"
          ls /opt/robocode/robots/*.jar 2>/dev/null | wc -l

          # Verify JARs are real (not LFS pointers)
          echo "--- JAR verification ---"
          FIRST_JAR=$(ls /opt/robocode/robots/*.jar 2>/dev/null | head -1)
          if [ -n "$FIRST_JAR" ]; then
            echo "First JAR: $FIRST_JAR ($(stat -c%s "$FIRST_JAR") bytes)"
            head -c 2 "$FIRST_JAR" | od -An -tx1
          fi

          # Check for stale robot database
          echo "--- robots/ directory contents ---"
          ls -la /opt/robocode/robots/ | head -20
          echo "--- robots/.data/ ---"
          ls -la /opt/robocode/robots/.data/ 2>/dev/null || echo "No .data/ directory"
          echo "--- robocode.properties ---"
          cat /opt/robocode/robocode.properties 2>/dev/null || echo "No robocode.properties"

          # Remove stale robot database to force re-scan
          rm -rf /opt/robocode/robots/.data 2>/dev/null || true

      # Pre-flight: verify Robocode engine works
      - name: Pre-flight test
        run: |
          echo "--- libs/ contents ---"
          ls /opt/robocode/libs/

          echo "--- Testing with sample robots ---"
          cat > /tmp/test.battle <<'EOF'
          #Battle Properties
          robocode.battleField.width=800
          robocode.battleField.height=600
          robocode.battle.numRounds=1
          robocode.battle.gunCoolingRate=0.1
          robocode.battle.rules.inactivityTime=450
          robocode.battle.hideEnemyNames=true
          robocode.battle.selectedRobots=sample.Fire,sample.Crazy
          EOF

          java -cp '/opt/robocode/libs/*' \
            -Xmx512M \
            -XX:+IgnoreUnrecognizedVMOptions \
            '--add-opens=java.base/sun.net.www.protocol.jar=ALL-UNNAMED' \
            '--add-opens=java.base/java.lang.reflect=ALL-UNNAMED' \
            '--add-opens=java.base/java.lang=ALL-UNNAMED' \
            '--add-opens=java.base/java.io=ALL-UNNAMED' \
            '--add-opens=java.base/java.net=ALL-UNNAMED' \
            '--add-opens=java.base/java.util=ALL-UNNAMED' \
            -DNOSECURITY=true \
            -Djava.awt.headless=true \
            robocode.Robocode \
            -cwd /opt/robocode \
            -battle /tmp/test.battle \
            -results /tmp/test-results.txt \
            -nodisplay 2>&1 || true

          echo "--- Sample battle results ---"
          cat /tmp/test-results.txt 2>/dev/null || echo "No results file"

          echo "--- Testing with competition bot (no version) ---"
          FIRST_JAR=$(ls /opt/robocode/robots/*.jar 2>/dev/null | head -1)
          FIRST_BOT=$(basename "$FIRST_JAR" .jar | sed 's/_/ /')
          BOT_CLASS=$(echo "$FIRST_BOT" | cut -d' ' -f1)
          echo "Testing bot: $BOT_CLASS (from $FIRST_JAR)"

          cat > /tmp/test2.battle <<EOF
          #Battle Properties
          robocode.battleField.width=800
          robocode.battleField.height=600
          robocode.battle.numRounds=1
          robocode.battle.gunCoolingRate=0.1
          robocode.battle.rules.inactivityTime=450
          robocode.battle.hideEnemyNames=true
          robocode.battle.selectedRobots=sample.Fire,$BOT_CLASS
          EOF

          java -cp '/opt/robocode/libs/*' \
            -Xmx512M \
            -XX:+IgnoreUnrecognizedVMOptions \
            '--add-opens=java.base/sun.net.www.protocol.jar=ALL-UNNAMED' \
            '--add-opens=java.base/java.lang.reflect=ALL-UNNAMED' \
            '--add-opens=java.base/java.lang=ALL-UNNAMED' \
            '--add-opens=java.base/java.io=ALL-UNNAMED' \
            '--add-opens=java.base/java.net=ALL-UNNAMED' \
            '--add-opens=java.base/java.util=ALL-UNNAMED' \
            -DNOSECURITY=true \
            -Djava.awt.headless=true \
            robocode.Robocode \
            -cwd /opt/robocode \
            -battle /tmp/test2.battle \
            -results /tmp/test2-results.txt \
            -nodisplay 2>&1 || true

          echo "--- Competition bot results ---"
          cat /tmp/test2-results.txt 2>/dev/null || echo "No results file"

          echo "--- Testing aw.Gilgalad (known-JAR bot) ---"
          cat > /tmp/test3.battle <<'EOF'
          #Battle Properties
          robocode.battleField.width=800
          robocode.battleField.height=600
          robocode.battle.numRounds=1
          robocode.battle.gunCoolingRate=0.1
          robocode.battle.rules.inactivityTime=450
          robocode.battle.hideEnemyNames=true
          robocode.battle.selectedRobots=sample.Fire,aw.Gilgalad
          EOF

          java -cp '/opt/robocode/libs/*' \
            -Xmx512M \
            -XX:+IgnoreUnrecognizedVMOptions \
            '--add-opens=java.base/sun.net.www.protocol.jar=ALL-UNNAMED' \
            '--add-opens=java.base/java.lang.reflect=ALL-UNNAMED' \
            '--add-opens=java.base/java.lang=ALL-UNNAMED' \
            '--add-opens=java.base/java.io=ALL-UNNAMED' \
            '--add-opens=java.base/java.net=ALL-UNNAMED' \
            '--add-opens=java.base/java.util=ALL-UNNAMED' \
            -DNOSECURITY=true \
            -Djava.awt.headless=true \
            robocode.Robocode \
            -cwd /opt/robocode \
            -battle /tmp/test3.battle \
            -results /tmp/test3-results.txt \
            -nodisplay 2>&1 || true

          echo "--- aw.Gilgalad results ---"
          cat /tmp/test3-results.txt 2>/dev/null || echo "No results file"

          echo "--- .data/ directory after scans ---"
          ls -la /opt/robocode/robots/.data/ 2>/dev/null || echo "No .data/ directory"
          ls -la /opt/robocode/robots/.robotcache/ 2>/dev/null || echo "No .robotcache/ directory"
          find /opt/robocode/robots/ -type d -name '.?*' 2>/dev/null || echo "No hidden dirs"

          echo "=== JAR contents comparison ==="
          echo "--- Working JAR: EFD.AdvancedEFD ---"
          unzip -l /opt/robocode/robots/EFD.AdvancedEFD_0.4.5a.jar 2>&1 | head -30
          echo "--- Failing JAR: aw.Gilgalad ---"
          unzip -l /opt/robocode/robots/aw.Gilgalad_1.99.5c.jar 2>&1 | head -30
          echo "--- Failing JAR: aaa.r.ScalarR ---"
          unzip -l /opt/robocode/robots/aaa.r.ScalarR_0.005h.053-noshield.jar 2>&1 | head -30
          echo "--- Properties files in JARs ---"
          for jar in EFD.AdvancedEFD_0.4.5a.jar aw.Gilgalad_1.99.5c.jar aaa.r.ScalarR_0.005h.053-noshield.jar Krabb.sliNk.Garm_0.9u.jar axeBots.Musashi_2.18.jar; do
            echo "$jar:"
            unzip -l /opt/robocode/robots/$jar 2>&1 | grep -i '\.properties' || echo "  (no .properties files)"
          done

      # Checkout repo to get latest run-battle.mjs
      - uses: actions/checkout@v6
        with:
          sparse-checkout: rumble/scripts
          path: repo

      # Run this chunk's battles with recording enabled
      - name: Run battles (chunk ${{ matrix.chunk }})
        run: |
          # Extract chunk battles from plan
          cat battle-plan.json | node -e "
            const fs = require('fs');
            const plan = JSON.parse(fs.readFileSync('/dev/stdin','utf-8'));
            fs.writeFileSync('chunk-battles.json', JSON.stringify(plan.chunks[${{ matrix.chunk }}]));
          "
          echo "Running $(node -e "console.log(JSON.parse(require('fs').readFileSync('chunk-battles.json','utf-8')).length)") battles..."

          node repo/rumble/scripts/run-battle.mjs \
            --robocode-dir /opt/robocode \
            --battles chunk-battles.json \
            --out results/ \
            --rounds ${{ inputs.rounds || '35' }} \
            --record-dir recordings/

      - uses: actions/upload-artifact@v7
        with:
          name: results-chunk-${{ matrix.chunk }}
          path: results/results.json

      - uses: actions/upload-artifact@v7
        with:
          name: recordings-chunk-${{ matrix.chunk }}
          path: recordings/
          retention-days: 90

  # ─── Step 3: Compute rankings and publish pages ───
  publish:
    needs: [plan, battles]
    if: always() && needs.plan.outputs.total_battles != '0' && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Fetch historical results from robots branch
      - name: Fetch historical results
        run: |
          mkdir -p results
          git fetch origin robots --depth=1 || true
          if git show origin/robots:results/ > /dev/null 2>&1; then
            git checkout origin/robots -- results/ 2>/dev/null || true
            echo "Loaded $(ls results/*.json 2>/dev/null | wc -l) historical result files"
          else
            echo "No historical results found"
          fi

      # Download all result chunks from this run
      - uses: actions/download-artifact@v8
        with:
          pattern: results-chunk-*
          path: all-results/
          merge-multiple: false

      # Merge new results with historical
      - name: Merge results
        run: |
          # Append new chunk results (timestamped to avoid overwriting historical)
          RUN_ID="${{ github.run_id }}"
          for f in all-results/results-chunk-*/results.json; do
            chunk=$(basename $(dirname "$f") | sed 's/results-chunk-//')
            cp "$f" "results/run-${RUN_ID}-chunk-${chunk}.json"
          done
          echo "Total result files: $(ls results/*.json 2>/dev/null | wc -l)"

      # Compute rankings from all results (historical + new)
      - name: Compute rankings
        run: |
          node rumble/scripts/compute-rankings.mjs \
            --results results/ \
            --out rankings.json

      # Generate static pages
      - name: Generate pages
        run: |
          node rumble/scripts/generate-pages.mjs \
            --rankings rankings.json \
            --results results/ \
            --out site/

      # Save results to robots branch
      - name: Save results to robots branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch or create robots branch
          git fetch origin robots --depth=1 || true

          WORK=$(mktemp -d)
          git worktree add "$WORK" origin/robots 2>/dev/null || {
            git worktree add -b robots --orphan "$WORK"
          }

          # Copy results
          mkdir -p "$WORK/results"
          cp results/*.json "$WORK/results/"
          cp rankings.json "$WORK/"

          cd "$WORK"
          git add -A
          git diff --cached --quiet || {
            git commit -m "Update results $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin HEAD:robots
          }
          cd -
          git worktree remove "$WORK" --force

      # Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          WORK=$(mktemp -d)
          git fetch origin gh-pages --depth=1 || true
          git worktree add "$WORK" origin/gh-pages 2>/dev/null || {
            git worktree add -b gh-pages --orphan "$WORK"
          }

          # Copy site files
          rm -rf "$WORK"/*
          cp -r site/* "$WORK/"

          cd "$WORK"
          git add -A
          git diff --cached --quiet || {
            git commit -m "Update rankings $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin HEAD:gh-pages
          }
          cd -
          git worktree remove "$WORK" --force

  # ─── Step 4: Auto-trigger next season if rankings not stabilized ───
  continue:
    needs: [plan, publish]
    if: always() && needs.publish.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check if more battles needed
        id: check
        run: |
          SEASON=${{ inputs.season || '1' }}
          MAX_SEASONS=${{ inputs.max_seasons || '5' }}

          # Fetch latest results (including this season's new data)
          mkdir -p results
          git fetch origin robots --depth=1 || true
          git checkout origin/robots -- results/ 2>/dev/null || true

          RESULTS_FLAG=""
          RESULT_COUNT=$(find results -name '*.json' 2>/dev/null | wc -l)
          if [ "$RESULT_COUNT" -gt 0 ]; then
            RESULTS_FLAG="--results results/"
          fi

          # Plan with min-battles filter to count how many pairs still need battles
          node rumble/scripts/plan-battles.mjs \
            --participants rumble/top50.txt \
            --chunks 1 \
            --min-battles ${{ inputs.min_battles_per_pair || '2' }} \
            $RESULTS_FLAG \
            --out check-plan.json

          REMAINING=$(jq '.total_battles' check-plan.json)

          echo "Season $SEASON complete. Pairs needing battles: $REMAINING. Max seasons: $MAX_SEASONS"

          if [ "$REMAINING" -gt 0 ] && [ "$SEASON" -lt "$MAX_SEASONS" ]; then
            echo "needs_more=true" >> "$GITHUB_OUTPUT"
            echo "Will trigger season $(($SEASON + 1))"
          else
            echo "needs_more=false" >> "$GITHUB_OUTPUT"
            if [ "$SEASON" -ge "$MAX_SEASONS" ]; then
              echo "Reached max seasons ($MAX_SEASONS)"
            else
              echo "All pairs have >= ${{ inputs.min_battles_per_pair || '2' }} battles"
            fi
          fi

      - name: Trigger next season
        if: steps.check.outputs.needs_more == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEXT_SEASON=$(( ${{ inputs.season || '1' }} + 1 ))
          gh workflow run run-season.yml \
            -f max_parallel="${{ inputs.max_parallel || '20' }}" \
            -f rounds="${{ inputs.rounds || '35' }}" \
            -f season="$NEXT_SEASON" \
            -f max_seasons="${{ inputs.max_seasons || '5' }}" \
            -f min_battles_per_pair="${{ inputs.min_battles_per_pair || '2' }}"
          echo "Triggered season $NEXT_SEASON"
