# run-season.yml — Orchestrator workflow for a full rumble season run.
# Plans battles, runs them in parallel using the Docker battle-runner image,
# computes rankings, publishes pages, and uploads battle recordings.
#
# Trigger: manual only (workflow_dispatch)

name: Run Rumble Season

on:
  workflow_dispatch:
    inputs:
      max_parallel:
        description: 'Maximum parallel battle jobs'
        required: false
        default: '20'
        type: string
      rounds:
        description: 'Rounds per battle'
        required: false
        default: '35'
        type: string

permissions:
  contents: write
  packages: read
  pages: write

jobs:
  # ─── Step 1: Plan battles ───
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      total_battles: ${{ steps.plan.outputs.total_battles }}
    steps:
      - uses: actions/checkout@v6

      - name: Plan battles
        id: plan
        run: |
          node rumble/scripts/plan-battles.mjs \
            --participants rumble/top50.txt \
            --chunks ${{ inputs.max_parallel || '20' }} \
            --out battle-plan.json

          TOTAL=$(jq '.total_battles' battle-plan.json)
          CHUNKS=$(jq '.num_chunks' battle-plan.json)
          MATRIX=$(jq -c '{chunk: [range(.num_chunks)]}' battle-plan.json)
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "total_battles=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "Planned $TOTAL battles in $CHUNKS chunks"

      - uses: actions/upload-artifact@v7
        with:
          name: battle-plan
          path: battle-plan.json

  # ─── Step 2: Run battles in parallel using Docker image ───
  battles:
    needs: [plan]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/pavelsavara/robocode-autopilot/battle-runner:latest
    strategy:
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
      max-parallel: 20
      fail-fast: false
    steps:
      # Download battle plan
      - uses: actions/download-artifact@v8
        with:
          name: battle-plan

      # Fetch robot JARs from robots branch
      - name: Fetch robot JARs
        run: |
          apk add --no-cache git git-lfs
          git lfs install
          git clone --depth=1 --branch=robots --single-branch \
            https://github.com/${{ github.repository }}.git /tmp/robots || true
          cd /tmp/robots && git lfs pull && cd -
          cp /tmp/robots/*.jar /opt/robocode/robots/ 2>/dev/null || true
          echo "Robots loaded:"
          ls /opt/robocode/robots/*.jar 2>/dev/null | wc -l

      # Run this chunk's battles with recording enabled
      - name: Run battles (chunk ${{ matrix.chunk }})
        run: |
          # Extract chunk battles from plan
          cat battle-plan.json | node -e "
            const fs = require('fs');
            const plan = JSON.parse(fs.readFileSync('/dev/stdin','utf-8'));
            fs.writeFileSync('chunk-battles.json', JSON.stringify(plan.chunks[${{ matrix.chunk }}]));
          "
          echo "Running $(node -e "console.log(JSON.parse(require('fs').readFileSync('chunk-battles.json','utf-8')).length)") battles..."

          node /opt/rumble/run-battle.mjs \
            --robocode-dir /opt/robocode \
            --battles chunk-battles.json \
            --out results/ \
            --rounds ${{ inputs.rounds || '35' }} \
            --record-dir recordings/

      - uses: actions/upload-artifact@v7
        with:
          name: results-chunk-${{ matrix.chunk }}
          path: results/results.json

      - uses: actions/upload-artifact@v7
        with:
          name: recordings-chunk-${{ matrix.chunk }}
          path: recordings/
          retention-days: 90

  # ─── Step 3: Compute rankings and publish pages ───
  publish:
    needs: [battles]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Fetch historical results from robots branch
      - name: Fetch historical results
        run: |
          mkdir -p results
          git fetch origin robots --depth=1 || true
          if git show origin/robots:results/ > /dev/null 2>&1; then
            git checkout origin/robots -- results/ 2>/dev/null || true
            echo "Loaded $(ls results/*.json 2>/dev/null | wc -l) historical result files"
          else
            echo "No historical results found"
          fi

      # Download all result chunks from this run
      - uses: actions/download-artifact@v8
        with:
          pattern: results-chunk-*
          path: all-results/
          merge-multiple: false

      # Merge new results with historical
      - name: Merge results
        run: |
          # Append new chunk results (timestamped to avoid overwriting historical)
          RUN_ID="${{ github.run_id }}"
          for f in all-results/results-chunk-*/results.json; do
            chunk=$(basename $(dirname "$f") | sed 's/results-chunk-//')
            cp "$f" "results/run-${RUN_ID}-chunk-${chunk}.json"
          done
          echo "Total result files: $(ls results/*.json 2>/dev/null | wc -l)"

      # Compute rankings from all results (historical + new)
      - name: Compute rankings
        run: |
          node rumble/scripts/compute-rankings.mjs \
            --results results/ \
            --out rankings.json

      # Generate static pages
      - name: Generate pages
        run: |
          node rumble/scripts/generate-pages.mjs \
            --rankings rankings.json \
            --results results/ \
            --out site/

      # Save results to robots branch
      - name: Save results to robots branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch or create robots branch
          git fetch origin robots --depth=1 || true

          WORK=$(mktemp -d)
          git worktree add "$WORK" origin/robots 2>/dev/null || {
            git worktree add -b robots --orphan "$WORK"
          }

          # Copy results
          mkdir -p "$WORK/results"
          cp results/*.json "$WORK/results/"
          cp rankings.json "$WORK/"

          cd "$WORK"
          git add -A
          git diff --cached --quiet || {
            git commit -m "Update results $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin HEAD:robots
          }
          cd -
          git worktree remove "$WORK" --force

      # Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          WORK=$(mktemp -d)
          git fetch origin gh-pages --depth=1 || true
          git worktree add "$WORK" origin/gh-pages 2>/dev/null || {
            git worktree add -b gh-pages --orphan "$WORK"
          }

          # Copy site files
          rm -rf "$WORK"/*
          cp -r site/* "$WORK/"

          cd "$WORK"
          git add -A
          git diff --cached --quiet || {
            git commit -m "Update rankings $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin HEAD:gh-pages
          }
          cd -
          git worktree remove "$WORK" --force
