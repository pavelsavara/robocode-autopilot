# build-docker-pipeline.yml — Build and push the Stage 2 pipeline Docker image to GHCR.
# Builds the pipeline from source with Gradle, then packages into a minimal JRE image.
name: Build Pipeline Docker Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'core/src/**'
      - 'pipeline/src/**'
      - 'core/build.gradle.kts'
      - 'pipeline/build.gradle.kts'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - 'Dockerfile.pipeline'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build pipeline distribution
        run: ./gradlew :pipeline:installDist

      - name: Run tests
        run: ./gradlew :core:test :pipeline:test

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.pipeline
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/pipeline-runner:latest

      - name: Make package public
        run: |
          gh api --method PUT \
            /user/packages/container/robocode-autopilot%2Fpipeline-runner/visibility \
            -f visibility=public || echo "Could not set visibility (may need manual config)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
