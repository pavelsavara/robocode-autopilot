# bot-submit.yml — Handle bot submissions via Issues.
#
# When an issue is opened with the "bot-submission" label, this workflow:
# 1. Parses the issue body for bot name and JAR URL
# 2. Downloads and validates the JAR
# 3. Adds the bot to participants.txt on the robots branch
# 4. Comments on the issue

name: Bot Submission

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  issues: write

jobs:
  process:
    if: contains(github.event.issue.labels.*.name, 'bot-submission')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Parse issue
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            // Expected format in issue body:
            // Bot Name: package.BotName version
            // JAR URL: https://...
            const nameMatch = body.match(/Bot\s*Name:\s*(.+)/i);
            const urlMatch = body.match(/JAR\s*URL:\s*(https?:\/\/\S+)/i);

            if (!nameMatch || !urlMatch) {
              core.setFailed('Could not parse bot name or JAR URL from issue body');
              return;
            }

            core.setOutput('bot_name', nameMatch[1].trim());
            core.setOutput('jar_url', urlMatch[1].trim());
            const safeName = nameMatch[1].trim().replace(/\s+/g, '_');
            core.setOutput('jar_file', `${safeName}.jar`);

      - name: Download and validate JAR
        if: steps.parse.outputs.jar_url
        run: |
          mkdir -p robots
          curl -fSL -o "robots/${{ steps.parse.outputs.jar_file }}" "${{ steps.parse.outputs.jar_url }}"
          # Basic validation: must be a valid ZIP/JAR
          file "robots/${{ steps.parse.outputs.jar_file }}" | grep -q "Zip\|Java" || {
            echo "Downloaded file is not a valid JAR"
            exit 1
          }

      - name: Add to robots branch
        if: steps.parse.outputs.bot_name
        run: |
          git fetch origin robots --depth=1 || true
          WORK=$(mktemp -d)
          git worktree add "$WORK" origin/robots 2>/dev/null || {
            git worktree add --orphan "$WORK" robots
          }

          cp "robots/${{ steps.parse.outputs.jar_file }}" "$WORK/"

          # Append to participants.txt if not already there
          touch "$WORK/participants.txt"
          if ! grep -qF "${{ steps.parse.outputs.bot_name }}" "$WORK/participants.txt"; then
            echo "${{ steps.parse.outputs.bot_name }}" >> "$WORK/participants.txt"
          fi

          cd "$WORK"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git lfs install
          git lfs track "*.jar"
          git add .gitattributes *.jar participants.txt
          git diff --cached --quiet || {
            git commit -m "Add bot: ${{ steps.parse.outputs.bot_name }}"
            git push origin HEAD:robots
          }

          cd -
          git worktree remove "$WORK" --force

      - name: Comment on issue
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ Bot **${{ steps.parse.outputs.bot_name }}** has been added to the rumble!\n\nIt will be included in the next season run.`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ Failed to process bot submission. Please check the format:\n\n\`\`\`\nBot Name: package.BotName version\nJAR URL: https://example.com/bot.jar\n\`\`\`\n\nSee the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`
            });
