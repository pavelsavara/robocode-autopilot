# 3-sprint-train.yml — Stage 3 of the sprint CI pipeline.
#
# Triggered by 2-sprint-process completion.
# Parallel jobs: train each ML model independently + run notebooks.
# Assemble job collects all models + merged .dat and commits to sprint branch.
#
# All jobs use the sprint-runner container (Java+Node+Python with pre-installed
# pip packages). No pip install at runtime.

name: 3 Sprint Train + Notebooks

on:
  workflow_run:
    workflows: ["1 Sprint Battles"]
    types: [completed]

  workflow_dispatch:
    inputs:
      source_run_id:
        description: 'Run ID of Sprint Process to use CSVs from'
        required: true
        type: string
      battles_run_id:
        description: 'Run ID of Sprint Battles (for .dat artifacts). Leave empty to auto-detect.'
        required: false
        type: string
      sprint_number:
        description: 'Sprint number for the branch name'
        required: true
        type: string
        default: '21'

permissions:
  contents: write
  packages: read
  actions: read

env:
  SPRINT_NUM: ${{ inputs.sprint_number || '21' }}
  SOURCE_RUN: ${{ inputs.source_run_id || github.event.workflow_run.id }}

jobs:
  # ─── Train fire_power model ───
  train-fire-power:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/pavelsavara/robocode-autopilot/sprint-runner:latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v6

      - name: Download combined CSVs
        uses: actions/download-artifact@v8
        with:
          name: csv-combined
          path: output/csv
          run-id: ${{ env.SOURCE_RUN }}
          github-token: ${{ github.token }}

      - name: Train fire_power
        working-directory: intuition
        run: |
          python3 train_distill.py --task fire_power --roots ../output/csv 2>&1 | tail -30
          cat models/distill/fire_power/metrics.json | python3 -m json.tool

      - name: Export fire_power to Java
        working-directory: intuition
        run: python3 export_gbm_java.py fire_power 2>&1 | tail -10

      - uses: actions/upload-artifact@v7
        with:
          name: model-fire-power
          path: |
            robot/src/main/java/cz/zamboch/distilled/FirePowerData.java
            intuition/models/distill/fire_power/metrics.json
          retention-days: 14

  # ─── Train fire_timing model ───
  train-fire-timing:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/pavelsavara/robocode-autopilot/sprint-runner:latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v6

      - name: Download combined CSVs
        uses: actions/download-artifact@v8
        with:
          name: csv-combined
          path: output/csv
          run-id: ${{ env.SOURCE_RUN }}
          github-token: ${{ github.token }}

      - name: Train fire_timing
        working-directory: intuition
        run: |
          python3 train_distill.py --task fire_timing --roots ../output/csv 2>&1 | tail -30
          cat models/distill/fire_timing/metrics.json | python3 -m json.tool

      - name: Export fire_timing to Java
        working-directory: intuition
        run: python3 export_gbm_java.py fire_timing 2>&1 | tail -10

      - uses: actions/upload-artifact@v7
        with:
          name: model-fire-timing
          path: |
            robot/src/main/java/cz/zamboch/distilled/FireTimingData.java
            intuition/models/distill/fire_timing/metrics.json
          retention-days: 14

  # ─── Train movement model ───
  train-movement:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/pavelsavara/robocode-autopilot/sprint-runner:latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v6

      - name: Download combined CSVs
        uses: actions/download-artifact@v8
        with:
          name: csv-combined
          path: output/csv
          run-id: ${{ env.SOURCE_RUN }}
          github-token: ${{ github.token }}

      - name: Train movement
        working-directory: intuition
        run: |
          python3 train_distill.py --task movement --roots ../output/csv 2>&1 | tail -30
          cat models/distill/movement/metrics.json | python3 -m json.tool

      - name: Export movement to Java
        working-directory: intuition
        run: python3 export_gbm_java.py movement 2>&1 | tail -10

      - uses: actions/upload-artifact@v7
        with:
          name: model-movement
          path: |
            robot/src/main/java/cz/zamboch/distilled/MovementData.java
            intuition/models/distill/movement/metrics.json
          retention-days: 14

  # ─── Run retrospective notebooks ───
  notebooks:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/pavelsavara/robocode-autopilot/sprint-runner:latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v6

      - name: Download combined CSVs
        uses: actions/download-artifact@v8
        with:
          name: csv-combined
          path: output/csv
          run-id: ${{ env.SOURCE_RUN }}
          github-token: ${{ github.token }}

      - name: Run retrospective notebooks
        working-directory: intuition
        run: |
          mkdir -p notebook-html

          echo "CSV location check:"
          find ../output/csv -name '*.csv' -type f | head -5 || echo "WARN: No CSVs at ../output/csv"

          for nb in retrospective/R*.ipynb; do
            if [ -f "$nb" ]; then
              NAME=$(basename "$nb" .ipynb)
              echo "Running $nb..."
              timeout 300 python3 -m jupyter nbconvert \
                --to html \
                --execute "$nb" \
                --output-dir notebook-html \
                --ExecutePreprocessor.timeout=300 \
                --allow-errors 2>&1 | tail -5 || echo "  WARN: $NAME timed out or failed"
              echo "  Done: $NAME"
            fi
          done

          echo "--- Generated notebooks ---"
          ls -la notebook-html/ 2>/dev/null || echo "No notebooks generated"

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: notebook-html
          path: intuition/notebook-html/
          retention-days: 30
          if-no-files-found: warn

  # ─── Assemble: collect model artifacts, merge .dat, commit to sprint branch ───
  assemble:
    needs: [train-fire-power, train-fire-timing, train-movement]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/pavelsavara/robocode-autopilot/sprint-runner:latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6

      - name: Download model artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: model-*
          path: model-artifacts/
          merge-multiple: true

      - name: Copy model files into repo
        run: |
          find model-artifacts -name '*Data.java' -exec cp {} robot/src/main/java/cz/zamboch/distilled/ \;
          echo "--- Model files ---"
          ls -la robot/src/main/java/cz/zamboch/distilled/*Data.java 2>/dev/null || echo "No Data.java files"

      - name: Find battles run ID
        id: find-battles
        run: |
          if [ -n "${{ inputs.battles_run_id }}" ]; then
            echo "battles_run_id=${{ inputs.battles_run_id }}" >> "$GITHUB_OUTPUT"
          else
            # Fallback: find the latest successful battles run
            STAGE1_ID=$(gh api "repos/${{ github.repository }}/actions/workflows/1-sprint-batlles.yml/runs?status=success&per_page=1" \
              --jq '.workflow_runs[0].id' 2>/dev/null || echo "")
            echo "battles_run_id=$STAGE1_ID" >> "$GITHUB_OUTPUT"
            echo "Resolved battles run ID: $STAGE1_ID"
          fi

      - name: Download .dat artifacts from battles
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          pattern: dat-chunk-*
          path: dat-chunks/
          run-id: ${{ steps.find-battles.outputs.battles_run_id }}
          github-token: ${{ github.token }}

      - name: Merge .dat files
        run: |
          DAT_COUNT=$(find dat-chunks -name 'autopilot.dat' -type f 2>/dev/null | wc -l)
          if [ "$DAT_COUNT" -gt 0 ]; then
            node scripts/merge-dat.mjs --input-dir dat-chunks --output merged-autopilot.dat
            if [ -f intuition/export_data_java.py ]; then
              python3 intuition/export_data_java.py merged-autopilot.dat
              echo "DefaultDataFile.java regenerated"
            fi
          else
            echo "No .dat files to merge"
          fi

      - name: Build retrain summary
        run: |
          python3 -c "
          import json, glob
          summary = {'models': {}}
          for mf in glob.glob('model-artifacts/**/metrics.json', recursive=True):
              for t in ['fire_power', 'fire_timing', 'movement']:
                  if t in mf:
                      with open(mf) as f:
                          summary['models'][t] = json.load(f)
                      break
          summary['branch'] = 'sprint/${{ env.SPRINT_NUM }}-models'
          summary['commit_sha'] = '${{ github.sha }}'
          with open('retrain-summary.json', 'w') as f:
              json.dump(summary, f, indent=2)
          print(json.dumps(summary, indent=2))
          "

      - uses: actions/upload-artifact@v7
        with:
          name: retrain-summary
          path: retrain-summary.json
          retention-days: 30

      - name: Commit to sprint branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="sprint/${{ env.SPRINT_NUM }}-models"
          git checkout -b "$BRANCH"
          git add robot/src/main/java/cz/zamboch/distilled/*Data.java || true
          git add robot/src/main/java/cz/zamboch/distilled/DefaultDataFile.java || true

          if git diff --cached --quiet; then
            echo "No model changes to commit"
          else
            git commit -m "sprint ${{ env.SPRINT_NUM }}: retrained models from CI pipeline

          See retrain-summary.json for metrics."
            git push origin "$BRANCH" --force
            echo "Pushed to $BRANCH"
          fi
