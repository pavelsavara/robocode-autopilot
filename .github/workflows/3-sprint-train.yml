# 3-sprint-train.yml — Stage 3 of the sprint CI pipeline.
#
# Triggered by 2-sprint-process completion.
# Parallel jobs: train each ML model independently + run notebooks.
# Assemble job collects all models and commits to sprint/{N}-models branch.

name: 3 Sprint Train + Notebooks

on:
  workflow_run:
    workflows: ["2 Sprint CSVs + Sanity Checks"]
    types: [completed]

  workflow_dispatch:
    inputs:
      source_run_id:
        description: 'Run ID of Sprint Process to use CSVs from'
        required: true
        type: string
      sprint_number:
        description: 'Sprint number for the branch name'
        required: true
        type: string
        default: '21'

permissions:
  contents: write
  packages: read
  actions: read

env:
  SPRINT_NUM: ${{ inputs.sprint_number || '21' }}
  SOURCE_RUN: ${{ inputs.source_run_id || github.event.workflow_run.id }}

jobs:
  # ─── Train fire_power model ───
  train-fire-power:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r intuition/requirements.txt

      - name: Download combined CSVs
        uses: actions/download-artifact@v8
        with:
          name: csv-combined
          path: output/csv
          run-id: ${{ env.SOURCE_RUN }}
          github-token: ${{ github.token }}

      - name: Train fire_power
        working-directory: intuition
        run: |
          python train_distill.py --task fire_power --roots ../output/csv 2>&1 | tail -30
          cat models/distill/fire_power/metrics.json | python -m json.tool

      - name: Export fire_power to Java
        working-directory: intuition
        run: python export_gbm_java.py fire_power 2>&1 | tail -10

      - uses: actions/upload-artifact@v7
        with:
          name: model-fire-power
          path: |
            robot/src/main/java/cz/zamboch/distilled/FirePowerData.java
            intuition/models/distill/fire_power/metrics.json
          retention-days: 14

  # ─── Train fire_timing model ───
  train-fire-timing:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r intuition/requirements.txt

      - name: Download combined CSVs
        uses: actions/download-artifact@v8
        with:
          name: csv-combined
          path: output/csv
          run-id: ${{ env.SOURCE_RUN }}
          github-token: ${{ github.token }}

      - name: Train fire_timing
        working-directory: intuition
        run: |
          python train_distill.py --task fire_timing --roots ../output/csv 2>&1 | tail -30
          cat models/distill/fire_timing/metrics.json | python -m json.tool

      - name: Export fire_timing to Java
        working-directory: intuition
        run: python export_gbm_java.py fire_timing 2>&1 | tail -10

      - uses: actions/upload-artifact@v7
        with:
          name: model-fire-timing
          path: |
            robot/src/main/java/cz/zamboch/distilled/FireTimingData.java
            intuition/models/distill/fire_timing/metrics.json
          retention-days: 14

  # ─── Train movement model ───
  train-movement:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r intuition/requirements.txt

      - name: Download combined CSVs
        uses: actions/download-artifact@v8
        with:
          name: csv-combined
          path: output/csv
          run-id: ${{ env.SOURCE_RUN }}
          github-token: ${{ github.token }}

      - name: Train movement
        working-directory: intuition
        run: |
          python train_distill.py --task movement --roots ../output/csv 2>&1 | tail -30
          cat models/distill/movement/metrics.json | python -m json.tool

      - name: Export movement to Java
        working-directory: intuition
        run: python export_gbm_java.py movement 2>&1 | tail -10

      - uses: actions/upload-artifact@v7
        with:
          name: model-movement
          path: |
            robot/src/main/java/cz/zamboch/distilled/MovementData.java
            intuition/models/distill/movement/metrics.json
          retention-days: 14

  # ─── Run retrospective notebooks ───
  notebooks:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: |
          pip install -r intuition/requirements.txt
          pip install nbconvert

      - name: Download combined CSVs
        uses: actions/download-artifact@v8
        with:
          name: csv-combined
          path: output/csv
          run-id: ${{ env.SOURCE_RUN }}
          github-token: ${{ github.token }}

      - name: Run retrospective notebooks
        working-directory: intuition
        run: |
          mkdir -p notebook-html

          # Verify CSVs are at the expected path (../output/csv/ from intuition/)
          echo "CSV location check:"
          find ../output/csv -name '*.csv' -type f | head -5 || echo "WARN: No CSVs at ../output/csv"

          for nb in retrospective/R*.ipynb; do
            if [ -f "$nb" ]; then
              NAME=$(basename "$nb" .ipynb)
              echo "Running $nb..."
              timeout 300 python -m jupyter nbconvert \
                --to html \
                --execute "$nb" \
                --output-dir notebook-html \
                --ExecutePreprocessor.timeout=300 \
                --allow-errors 2>&1 | tail -5 || echo "  WARN: $NAME timed out or failed"
              echo "  Done: $NAME"
            fi
          done

          echo "--- Generated notebooks ---"
          ls -la notebook-html/ 2>/dev/null || echo "No notebooks generated"

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: notebook-html
          path: intuition/notebook-html/
          retention-days: 30
          if-no-files-found: warn

  # ─── Assemble: collect model artifacts and commit to sprint branch ───
  assemble:
    needs: [train-fire-power, train-fire-timing, train-movement]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Download model artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: model-*
          path: model-artifacts/
          merge-multiple: true

      - name: Copy model files into repo
        run: |
          find model-artifacts -name '*Data.java' -exec cp {} robot/src/main/java/cz/zamboch/distilled/ \;
          echo "--- Model files ---"
          ls -la robot/src/main/java/cz/zamboch/distilled/*Data.java 2>/dev/null || echo "No Data.java files"

      - name: Build retrain summary
        run: |
          python3 -c "
          import json, glob
          summary = {'models': {}}
          for mf in glob.glob('model-artifacts/**/metrics.json', recursive=True):
              for t in ['fire_power', 'fire_timing', 'movement']:
                  if t in mf:
                      with open(mf) as f:
                          summary['models'][t] = json.load(f)
                      break
          summary['branch'] = 'sprint/${{ env.SPRINT_NUM }}-models'
          summary['commit_sha'] = '${{ github.sha }}'
          with open('retrain-summary.json', 'w') as f:
              json.dump(summary, f, indent=2)
          print(json.dumps(summary, indent=2))
          "

      - uses: actions/upload-artifact@v7
        with:
          name: retrain-summary
          path: retrain-summary.json
          retention-days: 30

      - name: Commit to sprint branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="sprint/${{ env.SPRINT_NUM }}-models"
          git checkout -b "$BRANCH"
          git add robot/src/main/java/cz/zamboch/distilled/*Data.java || true

          if git diff --cached --quiet; then
            echo "No model changes to commit"
          else
            git commit -m "sprint ${{ env.SPRINT_NUM }}: retrained ML models from CI pipeline

          See retrain-summary.json for metrics."
            git push origin "$BRANCH" --force
            echo "Pushed to $BRANCH"
          fi
